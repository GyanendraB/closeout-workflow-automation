name: Run Closeout Tests

on:
  # CI is temporarily disabled. Re-add triggers when you're ready to run in GitHub Actions.
  workflow_call:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: closeout-ai-validation-automation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            closeout-ai-validation-automation/package-lock.json

      - name: Populate optional environment values
        shell: bash
        run: |
          if [ -n "${{ vars.BASE_URL }}" ]; then echo "BASE_URL=${{ vars.BASE_URL }}" >> "$GITHUB_ENV"; fi
          if [ -n "${{ vars.API_BASE_URL }}" ]; then echo "API_BASE_URL=${{ vars.API_BASE_URL }}" >> "$GITHUB_ENV"; fi
          if [ -n "${{ vars.AUTH_URL }}" ]; then echo "AUTH_URL=${{ vars.AUTH_URL }}" >> "$GITHUB_ENV"; fi
          if [ -n "${{ vars.DEVICE_ID }}" ]; then echo "DEVICE_ID=${{ vars.DEVICE_ID }}" >> "$GITHUB_ENV"; fi
          if [ -n "${{ secrets.CLOSEOUT_USERNAME }}" ]; then echo "CLOSEOUT_USERNAME=${{ secrets.CLOSEOUT_USERNAME }}" >> "$GITHUB_ENV"; fi
          if [ -n "${{ secrets.CLOSEOUT_PASSWORD }}" ]; then echo "CLOSEOUT_PASSWORD=${{ secrets.CLOSEOUT_PASSWORD }}" >> "$GITHUB_ENV"; fi
          if [ -n "${{ secrets.ACCESS_TOKEN }}" ]; then echo "ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}" >> "$GITHUB_ENV"; fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run all tests
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: closeout-ai-validation-automation/reports/playwright-report
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: closeout-ai-validation-automation/allure-results
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: closeout-ai-validation-automation/test-results
          if-no-files-found: warn
